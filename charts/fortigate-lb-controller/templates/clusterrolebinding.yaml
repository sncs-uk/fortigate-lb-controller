---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "fortigate-lb-controller.name" . }}
  labels:
    {{- include "fortigate-lb-controller.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "fortigate-lb-controller.serviceAccountName" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "fortigate-lb-controller.name" . }}
  apiGroup: rbac.authorization.k8s.io
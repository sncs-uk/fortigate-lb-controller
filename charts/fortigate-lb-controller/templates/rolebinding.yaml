---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployment-reader
  labels:
    {{- include "fortigate-lb-controller.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "fortigate-lb-controller.serviceAccountName" . }}
roleRef:
  kind: Role
  name: deployment-reader
  apiGroup: rbac.authorization.k8s.io

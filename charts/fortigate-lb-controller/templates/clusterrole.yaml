---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "fortigate-lb-controller.name" . }}
  labels:
    {{- include "fortigate-lb-controller.labels" . | nindent 4 }}
rules:
- apiGroups: 
  - ""
  resources:
  - "services"
  - "services/status"
  verbs:
  - "get"
  - "watch"
  - "list"
  - "update"
  - "patch"
- apiGroups:
  - "sncs-uk.io"
  resources:
  - "lbpools"
  verbs:
  - "get"
  - "list"
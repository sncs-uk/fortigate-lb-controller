apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fortigate-lb-controller.configName" . }}
data:
  FORTIOS_ACCESS_HOSTNAME: {{ .Values.controller.fortigate.hostname }}
  FORTIOS_ACCESS_VDOM: {{ .Values.controller.fortigate.vdom }}
  FORTIOS_INSECURE: {{ .Values.controller.fortigate.insecure }}
  LOG_LEVEL: {{ .Values.controller.loglevel }}
  VIP_HERITAGE: {{ .Values.controller.heritgate }}